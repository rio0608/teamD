<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Time Tracker</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6fb;
}

.container{
    width:350px;
    margin:40px auto;
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#2563eb;
}

.total{
    background:#eef4ff;
    padding:15px;
    border-radius:10px;
    text-align:center;
    margin-top:20px;
}

.total h2{
    color:#2563eb;
    font-size:35px;
    margin:10px 0;
}

label{
    display:block;
    margin-top:20px;
    font-weight:bold;
}

select{
    width:100%;
    padding:10px;
    border-radius:8px;
    margin-top:8px;
}

.timer{
    text-align:center;
    font-size:40px;
    margin:30px 0;
    font-weight:bold;
}

.buttons{
    display:flex;
    justify-content:space-between;
}

button{
    width:45%;
    padding:15px;
    border:none;
    border-radius:10px;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.start{
    background:#22c55e;
}

.stop{
    background:#ef4444;
}
</style>

</head>
<body>

<div class="container">

<h1>📚 Study Time Tracker</h1>

<div class="total">
<p>今日の勉強時間</p>
<h2>00:00:00</h2>
</div>


<label>科目を選択</label>

<select id="subject">
    <option>数学</option>
    <option>英語</option>
    <option>国語</option>
    <option>理科</option>
    <option>社会</option>
    <option>情報</option>
    <option value="other">その他</option>
</select>

<input
    type="text"
    id="otherSubject"
    placeholder="科目を入力してください"
    style="display:none; width:100%; padding:10px; margin-top:10px; border-radius:8px;">

<div class="timer">
00:00:00
</div>

<div class="buttons">
<button class="start">開始</button>
<button class="stop">終了</button>
</div>

</div>

<script>
let timer;
let seconds = 0;
let running = false;

// タイマー表示
function updateTimer() {
    const h = String(Math.floor(seconds / 3600)).padStart(2, "0");
    const m = String(Math.floor((seconds % 3600) / 60)).padStart(2, "0");
    const s = String(seconds % 60).padStart(2, "0");

    document.querySelector(".timer").textContent = `${h}:${m}:${s}`;
}

// 開始ボタン
document.querySelector(".start").addEventListener("click", () => {
    if (running) return;

    running = true;

    timer = setInterval(() => {
        seconds++;
        updateTimer();
    }, 1000);
});

// 終了ボタン
document.querySelector(".stop").addEventListener("click", () => {
    clearInterval(timer);
    running = false;
});

const subject = document.getElementById("subject");
const otherSubject = document.getElementById("otherSubject");

subject.addEventListener("change", function () {
    if (this.value === "other") {
        otherSubject.style.display = "block";
    } else {
        otherSubject.style.display = "none";
        otherSubject.value = "";
    }
});
</script>

</body>
</html>
